                  <td style={{ padding: "8px 12px", borderBottom: "1px solid #0d0f12", color: "#777", fontSize: 13 }}>{theme}</td>
                  {stocks.map(s => (
                    <td key={s.ticker} style={{ padding: "8px 8px", borderBottom: "1px solid #0d0f12", textAlign: "center" }}>
                      {s.thematic.includes(theme) ? <span style={{ color: "#c9a84c", fontSize: 18 }}>●</span> : <span style={{ color: "#1e2028" }}>—</span>}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

      return (
        <div style={{ background: "#0a0c0f", minHeight: "100vh", color: "#f0f0f0", fontFamily: "'IBM Plex Sans', -apple-system, sans-serif", padding: "40px 24px" }}>

                  border: "1px solid", borderColor: tab === t.key ? "#c9a84c" : "#1e2028",
                  borderRadius: t.key === "defense" ? "8px 0 0 8px" : "0 8px 8px 0", cursor: "pointer", fontSize: 14, fontWeight: 700, letterSpacing: 1.5, fontFamily: "'IBM Plex Mono', monospace", transition: "all 0.2s"

            </div>

            <div style={{ background: "rgba(201, 168, 76, 0.05)", border: "1px solid rgba(201, 168, 76, 0.15)", borderRadius: 10, padding: "18px 22px", marginBottom: 20, fontSize: 14, color: "#999", lineHeight: 1.7 }}>
              {tab === "defense" ? (
                <span><span style={{ color: "#c9a84c", fontWeight: 700 }}>MACRO BACKDROP:</span> FY26 defense budget ~$962B (+13.4% YoY). Proposed FY27 at ~$1.5T. Global defense spending projected at $2.6T in 2026 (+8.1%). Operation Epic Fury (Iran strikes) driving acute missile/air defense demand. Executive order ties contractor compensation to delivery performance, restricts buybacks. European rearmament accelerating — NATO mandating 25% of procurement toward digital/autonomous. Golden Dome missile shield baseline cost ~$175B.</span>
              ) : (
                <span><span style={{ color: "#c9a84c", fontWeight: 700 }}>MACRO BACKDROP:</span> $1.4T needed for AI data center electrification by 2030. ~70% of US grid approaching end of life cycle. US electricity demand projected +17% by 2030 (up to +25% with full DC buildout). Data centers to consume 10% of US power by 2030 (from 4%). ELFY electrification ETF +14% YTD vs SPX -2%. Crude above $90 amid Iran conflict — input cost headwind for gas generation. Hyperscalers competing for grid capacity; utilities locking in long-term PPAs.</span>
              )}
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
              {signals.map(s => {
                const sc = s === "ALL" ? { bg: "#1a1d24", border: "#333", text: "#888" } : (signalColors[s] || signalColors["HOLD"]);
                return (
                  <button key={s} onClick={() => setFilterSignal(s)} style={{
                    padding: "6px 14px", fontSize: 12, fontWeight: 700, letterSpacing: 1, borderRadius: 5, cursor: "pointer",
                    background: filterSignal === s ? sc.bg : "transparent", color: filterSignal === s ? sc.text : "#444",
                    border: `1px solid ${filterSignal === s ? sc.border : "#1e2028"}`, fontFamily: "'IBM Plex Mono', monospace", transition: "all 0.15s"
                  }}>{s}</button>
                );
              })}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {filtered.map(s => (
                <StockCard key={s.ticker} stock={s} expanded={expanded === s.ticker} onToggle={() => setExpanded(expanded === s.ticker ? null : s.ticker)} />
              ))}
            </div>

            <ThematicMatrix stocks={stocks} title={tab === "defense" ? "DEFENSE" : "POWER"} />

            <div style={{ marginTop: 32, padding: "22px 24px", background: "#111318", border: "1px solid #1e2028", borderRadius: 10 }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#c9a84c", marginBottom: 12, letterSpacing: 1 }}>
                {tab === "defense" ? "DEFENSE PLAYBOOK" : "POWER PLAYBOOK"}
              </div>
              {tab === "defense" ? (
                <div style={{ fontSize: 15, color: "#999", lineHeight: 1.8 }}>
                  <p style={{ margin: "0 0 10px" }}><span style={{ color: "#22c55e", fontWeight: 700 }}>Core positions:</span> LMT + LHX offer the best combination of valuation support and direct catalyst exposure. LHX at ~18x is the cheapest prime with unique hypersonic tracking assets. LMT at ~22x with a $194B backlog is the most direct Iran/missile play.</p>

                </div>
              ) : (
                <div style={{ fontSize: 15, color: "#999", lineHeight: 1.8 }}>
                  <p style={{ margin: "0 0 10px" }}><span style={{ color: "#22c55e", fontWeight: 700 }}>Best risk/reward:</span> VST at ~16x fwd PE with 49% earnings growth expected. Down 28% from highs. Meta nuclear PPA provides visibility. ETN is the highest-quality compounder with Nvidia partnership and massive DC order acceleration.</p>

                </div>

            </div>

            <div style={{ marginTop: 24, fontSize: 12, color: "#333", textAlign: "center", lineHeight: 1.5 }}>
              FOR INFORMATIONAL PURPOSES ONLY — NOT INVESTMENT ADVICE · PRICES APPROXIMATE AS OF MARCH 10, 2026 · CONDUCT YOUR OWN DUE DILIGENCE

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
