  <script type="text/babel">

    const DEFENSE_STOCKS = [

    const POWER_STOCKS = [
      {
        ticker: "GEV", name: "GE Vernova", price: "~$850", fwdPE: "~47x", divYield: "0.2%", backlog: "$150B", revGrowth: "~16% (guide $44-45B)",
        thesis: "Premier provider of gas turbines and grid equipment at the epicenter of the electrification supercycle. $59B orders in 2025, backlog grew $31B to $150B. Data center electrification orders >$2B (tripled YoY). Ramping gas turbine capacity to 20GW by mid-2026. Acquired Prolec for NA transformer market.",
        catalysts: ["$1.4T needed for AI data center electrification by 2030", "Gas turbine capacity ramp to 20GW", "Prolec acquisition (transformers)", "Joined S&P 100", "$3.7B FCF in 2025"],
        risks: ["47x fwd PE is extremely stretched", "Wind division remains a drag", "Policy/permitting delays", "Near all-time highs (~$895 52-wk high)"],

      {
        ticker: "ETN", name: "Eaton Corporation", price: "~$344", fwdPE: "~32x", divYield: "1.2%", backlog: "200%+ growth (DC)", revGrowth: "~12%",

        risks: ["Q4 earnings miss (-8.6% EPS, -13.6% rev)", "Cyclical power market exposure", "Iran conflict driving crude >$90 (input costs)", "Weather disruption risk"],
        category: "Power Generation", thematic: ["Nuclear Power", "Merchant Power", "Data Center PPAs"], signal: "BUY",
        signalNote: "Best valuation in the power/AI theme at 16x fwd. Down 28% from highs = compelling entry"
      },
      {
        ticker: "CEG", name: "Constellation Energy", price: "~$317", fwdPE: "~30x", divYield: "0.5%", backlog: "Long-term PPAs", revGrowth: "~10%",
        thesis: "Largest US nuclear fleet providing 24/7 carbon-free baseload power. Data centers require the uptime reliability only nuclear can offer at scale. Down 23%+ from highs in early 2026. Nuclear renaissance thesis intact as hyperscalers compete for carbon-free capacity.",
        catalysts: ["Largest US nuclear fleet", "Hyperscaler PPA demand", "Nuclear renaissance / SMR optionality", "Regulatory support for nuclear"],
        risks: ["PE of 30x still not cheap", "NRC regulatory/relicensing risk", "Political risk around nuclear", "Competition from gas and renewables on cost"],

        signalNote: "Pullback from highs creates opportunity; best pure-play nuclear for AI power demand"
      },

        ticker: "PWR", name: "Quanta Services", price: "~$310", fwdPE: "~25x", divYield: "0.2%", backlog: "Record", revGrowth: "~15%",
        thesis: "The contractor actually building the grid and data center infrastructure. Record backlog driven by transmission, generation, and electrification capex. Demand driven by data centers, reshoring, EVs, and aging grid. One of the most capital-intensive infrastructure cycles in decades.",
        catalysts: ["Record backlog", "Grid modernization super-cycle", "Data center construction boom", "IIJA funding through 2026", "Reshoring/onshoring demand"],
        risks: ["Labor cost inflation", "Project execution risk at scale", "Interest rate sensitivity", "Competition from MasTec, EMCOR"],
        category: "Infrastructure/Contractor", thematic: ["Grid Construction", "Data Center Build", "Transmission"], signal: "BUY",
        signalNote: "Irreplaceable asset — someone has to build all this infrastructure. Record backlog = visibility"
      }
    ];

    const signalColors = {
      "BUY": { bg: "rgba(34, 197, 94, 0.15)", border: "#22c55e", text: "#22c55e" },
      "HOLD": { bg: "rgba(234, 179, 8, 0.15)", border: "#eab308", text: "#eab308" },
      "HOLD/ACCUMULATE": { bg: "rgba(234, 179, 8, 0.15)", border: "#eab308", text: "#eab308" },
      "ACCUMULATE": { bg: "rgba(59, 130, 246, 0.15)", border: "#3b82f6", text: "#3b82f6" },
      "SPECULATIVE": { bg: "rgba(168, 85, 247, 0.15)", border: "#a855f7", text: "#a855f7" },
      "BUY ON PULLBACK": { bg: "rgba(59, 130, 246, 0.15)", border: "#3b82f6", text: "#3b82f6" },
    };

    function StockCard({ stock, expanded, onToggle }) {
      const sc = signalColors[stock.signal] || signalColors["HOLD"];
      return (
        <div onClick={onToggle} style={{
          background: "#111318", border: "1px solid #1e2028", borderRadius: 10,
          padding: "18px 20px", cursor: "pointer", transition: "all 0.2s", borderLeft: `3px solid ${sc.border}`
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, fontWeight: 700, color: "#f0f0f0" }}>{stock.ticker}</span>
                <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, padding: "3px 8px", borderRadius: 4, background: sc.bg, color: sc.text, border: `1px solid ${sc.border}` }}>{stock.signal}</span>
                <span style={{ fontSize: 11, color: "#666", fontStyle: "italic" }}>{stock.category}</span>
              </div>
              <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>{stock.name}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15, color: "#c9a84c" }}>{stock.price}</div>
              <div style={{ fontSize: 11, color: "#666" }}>Fwd P/E: {stock.fwdPE}</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 16, fontSize: 11, color: "#777", marginBottom: 8 }}>
            <span>Div: {stock.divYield}</span>
            <span>Backlog: {stock.backlog}</span>
            <span>Rev Growth: {stock.revGrowth}</span>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
            {stock.thematic.map((t, i) => (
              <span key={i} style={{ fontSize: 9, padding: "2px 6px", borderRadius: 3, background: "rgba(201, 168, 76, 0.1)", color: "#c9a84c", border: "1px solid rgba(201, 168, 76, 0.2)" }}>{t}</span>
            ))}
          </div>
          <div style={{ fontSize: 12, color: sc.text, fontStyle: "italic", lineHeight: 1.4 }}>{stock.signalNote}</div>
          {expanded && (
            <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid #1e2028" }}>
              <div style={{ fontSize: 12, color: "#bbb", lineHeight: 1.6, marginBottom: 12 }}>{stock.thesis}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#22c55e", letterSpacing: 1, marginBottom: 6 }}>CATALYSTS</div>
                  {stock.catalysts.map((c, i) => (
                    <div key={i} style={{ fontSize: 11, color: "#888", lineHeight: 1.5, paddingLeft: 8, borderLeft: "2px solid #1a3a1a", marginBottom: 4 }}>{c}</div>
                  ))}

                  <div style={{ fontSize: 10, fontWeight: 700, color: "#ef4444", letterSpacing: 1, marginBottom: 6 }}>RISKS</div>

                    <div key={i} style={{ fontSize: 11, color: "#888", lineHeight: 1.5, paddingLeft: 8, borderLeft: "2px solid #3a1a1a", marginBottom: 4 }}>{r}</div>

    function ThematicMatrix({ stocks, title }) {
      const themes = [...new Set(stocks.flatMap(s => s.thematic))].sort();
      return (
        <div style={{ marginTop: 20, overflow: "auto" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#c9a84c", marginBottom: 8, letterSpacing: 1 }}>{title} — THEMATIC EXPOSURE</div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead>
              <tr>
                <th style={{ textAlign: "left", padding: "6px 8px", borderBottom: "1px solid #1e2028", color: "#666" }}>Theme</th>
                {stocks.map(s => (
                  <th key={s.ticker} style={{ padding: "6px 4px", borderBottom: "1px solid #1e2028", color: "#888", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10 }}>{s.ticker}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {themes.map(theme => (
                <tr key={theme}>
                  <td style={{ padding: "4px 8px", borderBottom: "1px solid #0d0f12", color: "#777", fontSize: 10 }}>{theme}</td>
                  {stocks.map(s => (
                    <td key={s.ticker} style={{ padding: "4px 4px", borderBottom: "1px solid #0d0f12", textAlign: "center" }}>
                      {s.thematic.includes(theme) ? <span style={{ color: "#c9a84c", fontSize: 14 }}>●</span> : <span style={{ color: "#1e2028" }}>—</span>}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("defense");
      const [expanded, setExpanded] = useState(null);
      const [filterSignal, setFilterSignal] = useState("ALL");

      const stocks = tab === "defense" ? DEFENSE_STOCKS : POWER_STOCKS;
      const filtered = filterSignal === "ALL" ? stocks : stocks.filter(s => s.signal === filterSignal);
      const signals = ["ALL", ...new Set(stocks.map(s => s.signal))];

      return (
        <div style={{ background: "#0a0c0f", minHeight: "100vh", color: "#f0f0f0", fontFamily: "'IBM Plex Sans', -apple-system, sans-serif", padding: "24px 20px" }}>
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
              <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 700, color: "#c9a84c" }}>SECTOR SCREENER</span>
              <span style={{ fontSize: 10, color: "#444", letterSpacing: 2, fontWeight: 700, marginTop: 4 }}>UBS | ALPHA PARTNERS</span>
            </div>
            <div style={{ fontSize: 11, color: "#555" }}>Defense &amp; Power/Electrification · Fundamentals + Thematic + Positioning · March 10, 2026</div>
          </div>

          <div style={{ display: "flex", gap: 0, marginBottom: 16 }}>

              <button key={t.key} onClick={() => { setTab(t.key); setExpanded(null); setFilterSignal("ALL"); }} style={{
                padding: "10px 20px", background: tab === t.key ? "#1a1d24" : "transparent", color: tab === t.key ? "#c9a84c" : "#555",
                border: "1px solid", borderColor: tab === t.key ? "#c9a84c" : "#1e2028",
                borderRadius: t.key === "defense" ? "6px 0 0 6px" : "0 6px 6px 0", cursor: "pointer", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, fontFamily: "'IBM Plex Mono', monospace", transition: "all 0.2s"
              }}>{t.icon} {t.label}</button>
            ))}
          </div>

          <div style={{ background: "rgba(201, 168, 76, 0.05)", border: "1px solid rgba(201, 168, 76, 0.15)", borderRadius: 8, padding: "14px 16px", marginBottom: 16, fontSize: 11, color: "#999", lineHeight: 1.6 }}>
            {tab === "defense" ? (
              <span><span style={{ color: "#c9a84c", fontWeight: 700 }}>MACRO BACKDROP:</span> FY26 defense budget ~$962B (+13.4% YoY). Proposed FY27 at ~$1.5T. Global defense spending projected at $2.6T in 2026 (+8.1%). Operation Epic Fury (Iran strikes) driving acute missile/air defense demand. Executive order ties contractor compensation to delivery performance, restricts buybacks. European rearmament accelerating — NATO mandating 25% of procurement toward digital/autonomous. Golden Dome missile shield baseline cost ~$175B.</span>
            ) : (
              <span><span style={{ color: "#c9a84c", fontWeight: 700 }}>MACRO BACKDROP:</span> $1.4T needed for AI data center electrification by 2030. ~70% of US grid approaching end of life cycle. US electricity demand projected +17% by 2030 (up to +25% with full DC buildout). Data centers to consume 10% of US power by 2030 (from 4%). ELFY electrification ETF +14% YTD vs SPX -2%. Crude above $90 amid Iran conflict — input cost headwind for gas generation. Hyperscalers competing for grid capacity; utilities locking in long-term PPAs.</span>
            )}
          </div>

          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {signals.map(s => {
              const sc = s === "ALL" ? { bg: "#1a1d24", border: "#333", text: "#888" } : (signalColors[s] || signalColors["HOLD"]);
              return (
                <button key={s} onClick={() => setFilterSignal(s)} style={{
                  padding: "4px 10px", fontSize: 9, fontWeight: 700, letterSpacing: 1, borderRadius: 4, cursor: "pointer",
                  background: filterSignal === s ? sc.bg : "transparent", color: filterSignal === s ? sc.text : "#444",
                  border: `1px solid ${filterSignal === s ? sc.border : "#1e2028"}`, fontFamily: "'IBM Plex Mono', monospace", transition: "all 0.15s"
                }}>{s}</button>
              );
            })}
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map(s => (
              <StockCard key={s.ticker} stock={s} expanded={expanded === s.ticker} onToggle={() => setExpanded(expanded === s.ticker ? null : s.ticker)} />
            ))}
          </div>

          <ThematicMatrix stocks={stocks} title={tab === "defense" ? "DEFENSE" : "POWER"} />

          <div style={{ marginTop: 24, padding: "16px 18px", background: "#111318", border: "1px solid #1e2028", borderRadius: 8 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#c9a84c", marginBottom: 8, letterSpacing: 1 }}>
              {tab === "defense" ? "DEFENSE PLAYBOOK" : "POWER PLAYBOOK"}
            </div>
            {tab === "defense" ? (
              <div style={{ fontSize: 12, color: "#999", lineHeight: 1.7 }}>
                <p style={{ margin: "0 0 8px" }}><span style={{ color: "#22c55e", fontWeight: 700 }}>Core positions:</span> LMT + LHX offer the best combination of valuation support and direct catalyst exposure. LHX at ~18x is the cheapest prime with unique hypersonic tracking assets. LMT at ~22x with a $194B backlog is the most direct Iran/missile play.</p>
                <p style={{ margin: "0 0 8px" }}><span style={{ color: "#3b82f6", fontWeight: 700 }}>Complement:</span> NOC for nuclear modernization duration. RTX on pullbacks for European rearmament + commercial aero dual exposure.</p>
                <p style={{ margin: "0" }}><span style={{ color: "#a855f7", fontWeight: 700 }}>Satellite / Spec:</span> KTOS and AVAV have the right products for the new warfare doctrine but valuations require patience. Size positions accordingly or use pullbacks.</p>
              </div>
            ) : (
              <div style={{ fontSize: 12, color: "#999", lineHeight: 1.7 }}>
                <p style={{ margin: "0 0 8px" }}><span style={{ color: "#22c55e", fontWeight: 700 }}>Best risk/reward:</span> VST at ~16x fwd PE with 49% earnings growth expected. Down 28% from highs. Meta nuclear PPA provides visibility. ETN is the highest-quality compounder with Nvidia partnership and massive DC order acceleration.</p>
                <p style={{ margin: "0 0 8px" }}><span style={{ color: "#3b82f6", fontWeight: 700 }}>Builders:</span> PWR (Quanta) is irreplaceable — someone has to construct all this infrastructure. Record backlog + multi-year cycle = visibility.</p>
                <p style={{ margin: "0" }}><span style={{ color: "#eab308", fontWeight: 700 }}>Watch for pullback:</span> GEV and VRT are exceptional businesses trading at 47x+ fwd. The thesis is right but the entry matters. GEV below $700 or VRT below $180 would be more compelling.</p>
              </div>
            )}
          </div>

          <div style={{ marginTop: 20, fontSize: 9, color: "#333", textAlign: "center", lineHeight: 1.5 }}>
            FOR INFORMATIONAL PURPOSES ONLY — NOT INVESTMENT ADVICE · PRICES APPROXIMATE AS OF MARCH 10, 2026 · CONDUCT YOUR OWN DUE DILIGENCE
          </div>
        </div>
      );
